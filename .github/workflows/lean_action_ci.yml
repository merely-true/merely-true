name: Lean Action CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if automated update bot
        id: is_bot
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          if [ "$AUTHOR" = "github-actions[bot]" ]; then
            echo "is_bot=true" >> $GITHUB_OUTPUT
            echo "✓ PR from automated update bot - skipping validation, will require manual merge"
          else
            echo "is_bot=false" >> $GITHUB_OUTPUT
          fi

      - name: Check author is repository collaborator
        if: steps.is_bot.outputs.is_bot != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          REPO="${{ github.repository }}"

          echo "Checking if $AUTHOR is a collaborator on $REPO..."

          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/collaborators/$AUTHOR")

          if [ "$STATUS_CODE" = "204" ]; then
            echo "✓ $AUTHOR is an approved collaborator"
          else
            echo "✗ $AUTHOR is not a repository collaborator"
            echo "Only approved accounts with identifiable owners can contribute."
            exit 1
          fi

      # The infrastructure-file admin gate lives in infra_gate.yml
      # (pull_request_target) because the pull_request token for fork PRs is
      # read-only, which makes /collaborators/{user}/permission return clamped
      # data and falsely reject admins.

      - name: Validate only Lean files are modified
        if: steps.is_bot.outputs.is_bot != 'true'
        id: check_lean_files
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Get all changed files
          CHANGED_FILES=$(git diff --name-only $BASE...$HEAD)

          # Filter out infrastructure files (already validated separately)
          NON_INFRA_FILES=$(echo "$CHANGED_FILES" | grep -v -E '^\.github/|^lakefile\.toml$|^lake-manifest\.json$|^lean-toolchain$|^\.gitignore$|^README\.md$' || true)

          if [ -z "$NON_INFRA_FILES" ]; then
            echo "✓ Only infrastructure files modified"
            echo "has_lean_files=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any non-infrastructure files are not .lean files
          NON_LEAN_FILES=$(echo "$NON_INFRA_FILES" | grep -v '\.lean$' || true)

          if [ -n "$NON_LEAN_FILES" ]; then
            echo "✗ PR contains non-Lean files:"
            echo "$NON_LEAN_FILES"
            echo ""
            echo "Only .lean files are permitted in PRs (except infrastructure files by admins)."
            exit 1
          else
            echo "✓ All non-infrastructure files are .lean files"
            echo "has_lean_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Remove stale project build artifacts
        if: steps.is_bot.outputs.is_bot == 'true' || steps.check_lean_files.outputs.has_lean_files == 'true'
        run: |
          # The restored Lake cache can contain old project .olean files for modules
          # that no longer exist in the current checkout. leanchecker scans every
          # project olean on LEAN_PATH, so clear the project's build outputs and let
          # the current checkout rebuild only the live modules.
          rm -rf .lake/build/lib/lean/MerelyTrue .lake/build/ir/MerelyTrue

      - name: Build with Lean
        if: steps.is_bot.outputs.is_bot == 'true' || steps.check_lean_files.outputs.has_lean_files == 'true'
        # Pin post-lean-action#156 until the next tagged release; v1/v1.4.0 still
        # use the legacy external lean4checker path for Lean v4.29.0.
        uses: leanprover/lean-action@844b3307d78316465f2cf6dfa05cc97cdeefdc96
        with:
          build-args: "--wfail"

      - name: Run leanchecker sequentially
        if: steps.is_bot.outputs.is_bot == 'true' || steps.check_lean_files.outputs.has_lean_files == 'true'
        run: |
          # `leanchecker` treats a target module as a prefix in non-`--fresh` mode.
          # Running it on `MerelyTrue` fans out across every project module in
          # parallel, which is too heavy for GitHub's hosted runners. Instead, run
          # it sequentially on leaf source modules only. We skip the two
          # import-only aggregator files:
          #   - MerelyTrue.lean -> imports MerelyTrue.BinomialAdd
          #   - MerelyTrue.Landau.lean -> imports the Landau leaf modules
          #
          # Future cleanup: once https://github.com/leanprover/lean-action/pull/162
          # (`leanchecker-args` input) lands and a new lean-action release is
          # tagged, AND once `leanchecker` itself gains a way to serialize its
          # internal `IO.asTask` fan-out (e.g. a `--jobs 1` flag), this whole
          # step can be replaced with the lean-action invocation above plus
          #     leanchecker: true
          #     leanchecker-args: "--jobs 1"   # or whatever flag lands
          # As an intermediate workaround that does not need either upstream
          # change, setting `env: LEAN_NUM_THREADS: "1"` on the lean-action
          # step also caps the fan-out (via Lean's task scheduler) and lets
          # us go back to `leanchecker: true`.
          find MerelyTrue -name '*.lean' ! -path 'MerelyTrue/Landau.lean' \
            | LC_ALL=C sort \
            | sed 's#/#.#g; s#\.lean$##' \
            | while IFS= read -r module; do
                echo "Checking $module"
                lake env leanchecker "$module"
              done
