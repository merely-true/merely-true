name: Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for infrastructure changes
        id: check_infra
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          INFRA_FILES=$(git diff --name-only "$BASE"..."$HEAD" | grep -E '^\.github/|^lakefile\.toml$|^lean-toolchain$|^\.gitignore$|^README\.md$' || true)
          if [ -n "$INFRA_FILES" ]; then
            echo "Infrastructure files modified — skipping auto-merge:"
            echo "$INFRA_FILES"
            echo "has_infra=true" >> $GITHUB_OUTPUT
          else
            echo "has_infra=false" >> $GITHUB_OUTPUT
          fi

      - name: Enable auto-merge
        if: steps.check_infra.outputs.has_infra != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto
